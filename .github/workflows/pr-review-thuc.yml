name: PR Review by Thuc

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  notify-thuc:
    runs-on: ubuntu-latest
    steps:
      - name: Notify Thuc for PR Review
        run: |
          curl -X POST "${{ secrets.OPENCLAW_WEBHOOK_URL }}/hooks/agent" \
            -H "Authorization: Bearer ${{ secrets.OPENCLAW_HOOK_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{
              "message": "Review this PR: ${{ github.event.pull_request.html_url }}\n\nTitle: ${{ github.event.pull_request.title }}\nAuthor: ${{ github.event.pull_request.user.login }}\nEvent: ${{ github.event.action }}\n\nCheck out the PR and review the latest code changes. If this is a synchronize event, new commits were pushed — re-review those changes. Leave feedback via gh pr review if you find issues. If it looks good, approve it.",
              "name": "GitHub PR",
              "agentId": "thuc",
              "deliver": true,
              "channel": "telegram",
              "to": "7670560461"
            }'
