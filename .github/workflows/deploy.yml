name: Deploy Blanket AI Agent

on:
  push:
    branches:
      - develop
      - main

jobs:
  deploy-backend:
    name: Deploy Backend (Cloud Functions)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: backend/functions/package-lock.json

      - name: Install dependencies
        working-directory: backend/functions
        run: npm ci

      - name: Build TypeScript
        working-directory: backend/functions
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write staging .env
        if: github.ref == 'refs/heads/develop'
        working-directory: backend/functions
        run: |
          cat > .env <<EOF
          POSTGRES_HOST=${{ secrets.STAGING_POSTGRES_HOST }}
          POSTGRES_PORT=5432
          POSTGRES_USER=blanket-app
          POSTGRES_DB=postgres
          EOF

      - name: Write prod .env
        if: github.ref == 'refs/heads/main'
        working-directory: backend/functions
        run: |
          cat > .env <<EOF
          POSTGRES_HOST=${{ secrets.PROD_POSTGRES_HOST }}
          POSTGRES_PORT=5432
          POSTGRES_USER=blanket-app
          POSTGRES_DB=postgres
          EOF

      - name: Deploy to Staging
        if: github.ref == 'refs/heads/develop'
        working-directory: backend
        run: firebase deploy --only functions --project blanket-staging --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy to Production
        if: github.ref == 'refs/heads/main'
        working-directory: backend
        run: firebase deploy --only functions --project blanket-alpha --token ${{ secrets.FIREBASE_TOKEN }}

      - name: Deployment Summary
        run: |
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "✅ Deployed to staging (blanket-staging)"
            echo "URL: https://us-central1-blanket-staging.cloudfunctions.net/aiAgent/v2/ai-assistant/health"
          else
            echo "✅ Deployed to production (blanket-alpha)"
            echo "URL: https://us-central1-blanket-alpha.cloudfunctions.net/aiAgent/v2/ai-assistant/health"
          fi
